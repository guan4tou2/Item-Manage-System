<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>離線中 - 物品管理系統</title>
    <style>
      :root {
        --bg: #0f172a;
        --panel: #1e293b;
        --text: #f8fafc;
        --muted: #cbd5e1;
        --accent: #60a5fa;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: "Noto Sans TC", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--text);
        background: radial-gradient(circle at top right, #1e3a5f 0, var(--bg) 50%);
      }
      .card {
        width: 100%;
        max-width: 440px;
        background: rgba(30, 41, 59, 0.92);
        border: 1px solid rgba(148, 163, 184, 0.28);
        border-radius: 20px;
        padding: 28px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 1.5rem;
      }
      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.6;
      }
      .tip {
        margin-top: 16px;
        font-size: 0.95rem;
      }
      a {
        display: inline-block;
        margin-top: 22px;
        color: #fff;
        text-decoration: none;
        font-weight: 700;
        background: linear-gradient(135deg, #3b82f6 0%, var(--accent) 100%);
        padding: 10px 14px;
        border-radius: 10px;
      }
    </style>
  </head>
  <body>
    <section class="card">
      <h1>目前離線中</h1>
      <p>網路連線中斷，暫時無法取得最新資料。</p>
      <p class="tip">你可以稍後重試，或返回已快取的頁面。</p>
      <a href="/">重新嘗試連線</a>
    </section>
  </body>
</html>
