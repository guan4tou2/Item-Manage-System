name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ims_test
          POSTGRES_USER: ims
          POSTGRES_PASSWORD: ims
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U ims"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install uv
      - run: uv venv .venv
      - run: |
          . .venv/bin/activate
          uv pip install -e ".[test]"
      - run: |
          . .venv/bin/activate
          pytest -q
        env:
          DATABASE_URL: postgresql+asyncpg://ims:ims@localhost:5432/ims_test
          JWT_SECRET: ci-secret

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install API + export OpenAPI
        working-directory: apps/api
        run: |
          pip install uv
          uv venv .venv
          . .venv/bin/activate
          uv pip install -e ".[test]"
          python scripts/export_openapi.py > ../../packages/api-types/openapi.json
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - name: Generate TypeScript types
        run: pnpm --filter @ims/api-types gen:types
      - run: pnpm --filter @ims/web typecheck
      - run: pnpm --filter @ims/web lint
      - run: pnpm --filter @ims/web test
      - run: pnpm --filter @ims/web build

  docker:
    runs-on: ubuntu-latest
    needs: [api, web]
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -t ims-api:ci -f apps/api/Dockerfile apps/api
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install API + export OpenAPI
        working-directory: apps/api
        run: |
          pip install uv
          uv venv .venv
          . .venv/bin/activate
          uv pip install -e ".[test]"
          python scripts/export_openapi.py > ../../packages/api-types/openapi.json
      - name: Generate TypeScript types
        run: |
          corepack enable
          corepack prepare pnpm@9.12.0 --activate
          pnpm install --frozen-lockfile --filter @ims/api-types...
          pnpm --filter @ims/api-types gen:types
      - name: Build web image
        run: docker build -t ims-web:ci -f apps/web/Dockerfile .
