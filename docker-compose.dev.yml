name: ims-v2

services:
  web:
    command: ["pnpm", "dev"]
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    environment:
      NODE_ENV: development

  api:
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --reload --host 0.0.0.0 --port 8000"
    volumes:
      - ./apps/api:/app
