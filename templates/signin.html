<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="物品管理系統 - 登入" />
    <link rel="icon" href="{{url_for('static', filename='favicon.ico')}}" />
    <title>登入 - 物品管理系統</title>

    <link
      href="{{url_for('static',filename='css/bootstrap.min.css')}}"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link href="{{url_for('static',filename='css/signin.css')}}" rel="stylesheet" />
  </head>
  <body>
    <!-- 背景裝飾 -->
    <div class="bg-shapes">
      <div class="bg-shape bg-shape-1"></div>
      <div class="bg-shape bg-shape-2"></div>
      <div class="bg-shape bg-shape-3"></div>
    </div>

    <div class="signin-container">
      <div class="signin-card">
        <!-- Logo 區域 -->
        <div class="signin-logo">
          <div class="logo-icon">
            <i class="fas fa-box-open"></i>
          </div>
          <h1 class="signin-title">物品管理系統</h1>
          <p class="signin-subtitle">輕鬆管理家中物品，記錄放置位置</p>
        </div>

        <!-- 登入表單 -->
        <form action="{{ url_for('auth.signin') }}" method="post">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
          
          <div class="form-group">
            <label class="form-label">帳號</label>
            <div class="input-wrapper">
              <input
                type="text"
                class="form-control"
                name="UserID"
                placeholder="請輸入您的帳號"
                required
                autocomplete="username"
              />
              <i class="fas fa-user"></i>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">密碼</label>
            <div class="input-wrapper">
              <input
                type="password"
                class="form-control"
                name="Password"
                placeholder="請輸入您的密碼"
                required
                autocomplete="current-password"
              />
              <i class="fas fa-lock"></i>
            </div>
          </div>

          <button type="submit" class="btn-signin">
            <i class="fas fa-sign-in-alt"></i>
            登入系統
          </button>
        </form>

        <!-- 操作提示 -->
        <div class="hint-text">
          <i class="fas fa-lightbulb me-1"></i>
          首次使用？請聯繫系統管理員取得帳號與密碼。
        </div>
        
        <!-- 註冊連結 -->
        <p class="auth-link">
          還沒有帳號？<a href="{{ url_for('auth.signup') }}">立即註冊</a>
        </p>

        <!-- 忘記密碼 -->
        <p class="auth-link" style="margin-top: 0.5rem;">
          <a href="#" onclick="showForgotPasswordHelp()" class="text-muted" style="font-size: 0.9rem;">
            <i class="fas fa-key me-1"></i>忘記密碼？
          </a>
        </p>

        <!-- 功能說明 -->
        <div class="features">
          <p class="features-title">系統功能</p>
          <div class="feature-list">
            <div class="feature-item">
              <div class="feature-icon">
                <i class="fas fa-camera"></i>
              </div>
              <p class="feature-text">拍照記錄</p>
            </div>
            <div class="feature-item">
              <div class="feature-icon">
                <i class="fas fa-map-marker-alt"></i>
              </div>
              <p class="feature-text">位置追蹤</p>
            </div>
            <div class="feature-item">
              <div class="feature-icon">
                <i class="fas fa-search"></i>
              </div>
              <p class="feature-text">快速搜尋</p>
            </div>
            <div class="feature-item">
              <div class="feature-icon">
                <i class="fas fa-qrcode"></i>
              </div>
              <p class="feature-text">條碼掃描</p>
            </div>
          </div>
        </div>
      </div>

      <p class="copyright">&copy; <span id="copyrightYear"></span> 物品管理系統</p>
    </div>

    <!-- 錯誤訊息 Modal -->
    <div
      class="modal fade"
      id="errorModal"
      tabindex="-1"
      aria-labelledby="errorModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="errorModalLabel">
              <i class="fas fa-exclamation-circle me-2"></i>登入失敗
            </h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <i class="fas fa-times-circle"></i>
            <p>{{error}}</p>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-primary"
              data-bs-dismiss="modal"
            >
              <i class="fas fa-redo me-1"></i>重新輸入
            </button>
          </div>
        </div>
      </div>
    </div>
    
    <!-- 忘記密碼說明 Modal -->
    <div
      class="modal fade"
      id="forgotPasswordModal"
      tabindex="-1"
      aria-labelledby="forgotPasswordModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header bg-primary">
            <h5 class="modal-title text-white" id="forgotPasswordModalLabel">
              <i class="fas fa-key me-2"></i>忘記密碼
            </h5>
            <button
              type="button"
              class="btn-close btn-close-white"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body p-4 text-center">
            <i class="fas fa-user-shield fa-3x text-primary mb-3"></i>
            <h5>需要重置密碼？</h5>
            <p class="text-muted mb-4">
              為了確保帳戶安全，密碼重置需要由系統管理員協助處理。
            </p>
            
            <div class="card bg-light mb-3">
              <div class="card-body text-start">
                <h6 class="card-title">
                  <i class="fas fa-info-circle me-1 text-primary"></i>
                  重置步驟：
                </h6>
                <ol class="small text-muted mb-0">
                  <li>聯繫您的系統管理員</li>
                  <li>提供您的帳號名稱</li>
                  <li>管理員將為您重置密碼</li>
                  <li>使用新密碼登入後請立即修改</li>
                </ol>
              </div>
            </div>
            
            <div class="alert alert-warning small text-start mb-0">
              <i class="fas fa-lightbulb me-1"></i>
              <strong>提示：</strong>預設管理員帳號為 <code>admin</code>
            </div>
          </div>
          <div class="modal-footer justify-content-center border-0 pb-4 px-4">
            <button
              type="button"
              class="btn btn-primary px-4 py-2 rounded-3 fw-semibold"
              data-bs-dismiss="modal"
            >
              <i class="fas fa-check me-1"></i>我知道了
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="{{url_for('static',filename='js/bootstrap.bundle.min.js')}}"></script>
    
    <script>
      document.getElementById('copyrightYear').textContent = new Date().getFullYear();
      function showForgotPasswordHelp() {
        new bootstrap.Modal(document.getElementById('forgotPasswordModal')).show();
      }
    </script>
    
    {%if error%}
    <script>
      var errorModal = new bootstrap.Modal(document.getElementById("errorModal"));
      errorModal.toggle();
    </script>
    {%endif%}
  </body>
</html>
