{%extends "template.html"%}

{%block title%}個人設定 - 物品管理系統{%endblock%}

{%block user%}{{User.User}}{%endblock%}

{%block contain%}
<div class="d-flex align-items-center mb-2">
  <i class="fas fa-user-circle fa-2x me-3 text-primary"></i>
  <div>
    <h2 class="mb-0">個人設定</h2>
    <small class="text-muted">管理您的帳號資訊與偏好設定</small>
  </div>
</div>
{%endblock%}

{%block body%}
<form method="POST" action="{{url_for('profile.update_profile')}}">
  <input type="hidden" name="csrf_token" value="{{csrf_token()}}">

  <!-- 基本資料 -->
  <div class="card mb-4">
    <div class="card-header">
      <i class="fas fa-id-card me-2"></i>基本資料
    </div>
    <div class="card-body">
      <div class="row g-3">
        <div class="col-md-6">
          <div class="form-floating">
            <input
              type="text"
              class="form-control"
              id="display_name"
              name="display_name"
              placeholder="顯示名稱"
              maxlength="100"
              value="{{profile.display_name or ''}}"
            />
            <label for="display_name">顯示名稱（可留空）</label>
          </div>
        </div>
        <div class="col-md-6">
          <div class="form-floating">
            <input
              type="email"
              class="form-control"
              id="email"
              name="email"
              placeholder="電子郵件"
              value="{{profile.email or ''}}"
            />
            <label for="email">電子郵件</label>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 偏好設定 -->
  <div class="card mb-4">
    <div class="card-header">
      <i class="fas fa-sliders-h me-2"></i>偏好設定
    </div>
    <div class="card-body">
      <div class="row g-3">
        <div class="col-md-6">
          <div class="form-floating">
            <select class="form-select" id="theme_preference" name="theme_preference">
              <option value="light" {{'selected' if profile.theme_preference == 'light' else ''}}>淺色模式</option>
              <option value="dark" {{'selected' if profile.theme_preference == 'dark' else ''}}>深色模式</option>
            </select>
            <label for="theme_preference">主題</label>
          </div>
        </div>
        <div class="col-md-6">
          <div class="form-floating">
            <select class="form-select" id="language" name="language">
              <option value="zh_TW" {{'selected' if profile.language == 'zh_TW' else ''}}>繁體中文</option>
              <option value="en" {{'selected' if profile.language == 'en' else ''}}>English</option>
            </select>
            <label for="language">語言</label>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 密碼修改 -->
  <div class="card mb-4">
    <div class="card-header">
      <i class="fas fa-lock me-2"></i>密碼
    </div>
    <div class="card-body">
      <p class="text-muted mb-2">如需修改密碼，請前往密碼修改頁面。</p>
      <a href="{{url_for('auth.change_password')}}" class="btn btn-outline-secondary">
        <i class="fas fa-key me-2"></i>修改密碼
      </a>
    </div>
  </div>

  <div class="d-flex gap-2">
    <button type="submit" class="btn btn-primary">
      <i class="fas fa-save me-2"></i>儲存設定
    </button>
    <a href="{{url_for('items.home')}}" class="btn btn-outline-secondary">取消</a>
  </div>
</form>
{%endblock%}
