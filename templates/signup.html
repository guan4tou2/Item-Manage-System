<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="物品管理系統 - 註冊" />
    <link rel="icon" href="{{url_for('static', filename='favicon.ico')}}" />
    <title>註冊 - 物品管理系統</title>

    <link
      href="{{url_for('static',filename='css/bootstrap.min.css')}}"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">

    <link href="{{url_for('static', filename='css/main.css')}}" rel="stylesheet" />
    <link href="{{url_for('static', filename='css/signup.css')}}" rel="stylesheet" />
  </head>
  <body>
    <!-- 背景裝飾 -->
    <div class="bg-shapes">
      <div class="bg-shape bg-shape-1"></div>
      <div class="bg-shape bg-shape-2"></div>
    </div>

    <div class="signup-container">
      <div class="signup-card">
        <!-- Logo 區域 -->
        <div class="signup-logo">
          <div class="logo-icon">
            <i class="fas fa-user-plus"></i>
          </div>
          <h1 class="signup-title">建立帳號</h1>
          <p class="signup-subtitle">加入物品管理系統，開始整理您的物品</p>
        </div>

        <!-- 註冊表單 -->
        <form action="{{ url_for('auth.signup') }}" method="post">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
          
          <div class="form-group">
            <label class="form-label">帳號</label>
            <div class="input-wrapper">
              <input
                type="text"
                class="form-control"
                name="UserID"
                placeholder="請輸入帳號（至少3個字元）"
                required
                minlength="3"
                autocomplete="username"
              />
              <i class="fas fa-user"></i>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">密碼</label>
            <div class="input-wrapper">
              <input
                type="password"
                class="form-control"
                name="Password"
                id="password"
                placeholder="請輸入密碼（至少8個字元）"
                required
                minlength="8"
                autocomplete="new-password"
              />
              <i class="fas fa-lock"></i>
            </div>
            <div class="password-strength">
              <div class="password-strength-bar" id="strengthBar"></div>
            </div>
            <p class="password-hint" id="strengthHint">密碼強度</p>
            <ul class="list-unstyled small mt-1" id="pwChecklist" style="display:none;">
              <li id="chk-len"><i class="fas fa-circle text-secondary me-1"></i>至少 8 個字元</li>
              <li id="chk-upper"><i class="fas fa-circle text-secondary me-1"></i>至少一個大寫字母</li>
              <li id="chk-lower"><i class="fas fa-circle text-secondary me-1"></i>至少一個小寫字母</li>
              <li id="chk-digit"><i class="fas fa-circle text-secondary me-1"></i>至少一個數字</li>
            </ul>
          </div>

          <div class="form-group">
            <label class="form-label">確認密碼</label>
            <div class="input-wrapper">
              <input
                type="password"
                class="form-control"
                name="ConfirmPassword"
                id="confirmPassword"
                placeholder="再次輸入密碼"
                required
                minlength="8"
                autocomplete="new-password"
              />
              <i class="fas fa-lock"></i>
            </div>
          </div>

          <button type="submit" class="btn-signup">
            <i class="fas fa-user-plus"></i>
            建立帳號
          </button>
        </form>

        <p class="terms">
          註冊即表示您同意我們的服務條款和隱私政策
        </p>

        <p class="login-link">
          已有帳號？<a href="{{ url_for('auth.signin') }}">立即登入</a>
        </p>
      </div>

      <p class="copyright">&copy; 2024 物品管理系統</p>
    </div>

    <script src="{{url_for('static',filename='js/bootstrap.bundle.min.js')}}"></script>
    <script>
      // 密碼強度檢測
      const passwordInput = document.getElementById('password');
      const strengthBar = document.getElementById('strengthBar');
      const strengthHint = document.getElementById('strengthHint');
      const confirmInput = document.getElementById('confirmPassword');

      passwordInput.addEventListener('input', function() {
        const password = this.value;
        let strength = 0;
        let hint = '';

        if (password.length >= 8) strength++;
        if (password.length >= 10) strength++;
        if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
        if (/\d/.test(password)) strength++;
        if (/[^a-zA-Z0-9]/.test(password)) strength++;

        strengthBar.className = 'password-strength-bar';

        if (password.length === 0) {
          hint = '密碼強度';
          document.getElementById('pwChecklist').style.display = 'none';
        } else if (strength <= 2) {
          strengthBar.classList.add('weak');
          hint = '密碼強度：弱';
          document.getElementById('pwChecklist').style.display = 'block';
        } else if (strength <= 3) {
          strengthBar.classList.add('medium');
          hint = '密碼強度：中等';
          document.getElementById('pwChecklist').style.display = 'block';
        } else {
          strengthBar.classList.add('strong');
          hint = '密碼強度：強';
          document.getElementById('pwChecklist').style.display = 'block';
        }

        strengthHint.textContent = hint;

        // Update requirement checklist
        function setChk(id, ok) {
          const el = document.getElementById(id);
          const icon = el.querySelector('i');
          icon.className = ok ? 'fas fa-check-circle text-success me-1' : 'fas fa-circle text-secondary me-1';
        }
        setChk('chk-len',   password.length >= 8);
        setChk('chk-upper', /[A-Z]/.test(password));
        setChk('chk-lower', /[a-z]/.test(password));
        setChk('chk-digit', /\d/.test(password));
      });

      // 確認密碼匹配檢查
      confirmInput.addEventListener('input', function() {
        if (this.value !== passwordInput.value) {
          this.setCustomValidity('密碼不一致');
        } else {
          this.setCustomValidity('');
        }
      });
    </script>
  </body>
</html>
