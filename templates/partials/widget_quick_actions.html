<!-- Widget: Quick actions -->
<div class="card mb-4 animate-fadeInUp stagger-1" data-widget-type="quick_actions">
  <div class="card-header">
    <i class="fas fa-bolt text-warning me-2"></i>{{ _('快速操作') }}
  </div>
  <div class="card-body d-grid gap-2">
    {%if User.admin%}
    <a href="{{url_for('items.additem')}}" class="btn btn-primary">
      <i class="fas fa-plus me-2"></i>{{ _('新增物品') }}
    </a>
    {%endif%}
    <a href="{{url_for('items.scan')}}" class="btn btn-outline-secondary">
      <i class="fas fa-qrcode me-2"></i>{{ _('掃描條碼') }}
    </a>
    <a href="{{url_for('items.search')}}" class="btn btn-outline-secondary">
      <i class="fas fa-search me-2"></i>{{ _('搜尋物品') }}
    </a>
    <a href="{{url_for('items.notifications')}}" class="btn btn-outline-warning">
      <i class="fas fa-bell me-2"></i>{{ _('查看通知') }}
    </a>
    <a href="{{url_for('items.statistics')}}" class="btn btn-outline-info">
      <i class="fas fa-chart-bar me-2"></i>{{ _('統計報表') }}
    </a>
  </div>
</div>
