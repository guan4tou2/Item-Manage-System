<!-- Widget: Low stock items -->
<div class="card mb-4 animate-fadeInUp stagger-2" data-widget-type="low_stock">
  <div class="card-header d-flex justify-content-between align-items-center">
    <span><i class="fas fa-exclamation-triangle text-danger me-2"></i>{{ _('低庫存物品') }}</span>
    <a href="{{url_for('items.reorder_list')}}" class="small text-decoration-none">{{ _('查看全部') }} &rsaquo;</a>
  </div>
  <div class="card-body">
    {%if low_stock_items%}
    <ul class="list-group list-group-flush">
      {%for item in low_stock_items%}
      <li class="list-group-item d-flex justify-content-between align-items-center px-0">
        <a href="{{url_for('items.item_detail', item_id=item.ItemID)}}" class="text-decoration-none fw-semibold">
          {{item.ItemName}}
        </a>
        <span class="badge {{'bg-danger' if item.stock_status == 'critical' else 'bg-warning text-dark'}}">
          {{ _('庫存：') }}{{item.Quantity}}{% if item.ReorderLevel %} / {{item.ReorderLevel}}{% endif %}
        </span>
      </li>
      {%endfor%}
    </ul>
    {%else%}
    <p class="text-muted mb-0"><i class="fas fa-check-circle text-success me-1"></i>{{ _('目前沒有低庫存物品') }}</p>
    {%endif%}
  </div>
</div>
